};

const PASARAN = ['Legi','Pahing','Pon','Wage','Kliwon'];
const DINO = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const NEPTU_DINO = {Minggu:5,Senin:4,Selasa:3,Rabu:7,Kamis:8,Jumat:6,Sabtu:9};
const NEPTU_PASARAN = {Legi:5,Pahing:9,Pon:7,Wage:4,Kliwon:8};

function ambilSukuKata(text){
  text = text.toUpperCase().replace(/[^A-Z]/g,'');
  let hasil = [];
  let i = 0;
  while(i < text.length){
    let dua = text.substr(i,2);
    if(['NG','NY','DH','TH'].includes(dua)){
      hasil.push(dua);
      i += 2;
      if(i < text.length && 'AIUEO'.includes(text[i])) i++;
    } else if(AKSARA[text[i]]){
      hasil.push(text[i]);
      i++;
      if(i < text.length && 'AIUEO'.includes(text[i])) i++;
    } else {
      i++;
    }
  }
  return hasil;
}

function hitungTotal(nama){
  let kata2 = nama.split(' ');
  let total = 0;
  let detail = [];
  kata2.forEach(kata => {
    let suku = ambilSukuKata(kata);
    let subtotal = 0;
    let breakdown = [];
    suku.forEach(s => {
      let n = AKSARA[s] || 0;
      subtotal += n;
      breakdown.push(`${s}=${n}`);
    });
    total += subtotal;
    detail.push(`${kata}: ${breakdown.join('+')} = ${subtotal}`);
  });
  return {total, detail};
}

function hitungWeton(tgl){
  if(!tgl) return null;
  let d = new Date(tgl);
  let hari = DINO[d.getDay()];
  let epoch = new Date('1900-01-01');
  let days = Math.floor((d - epoch) / 86400000);
  let pasaran = PASARAN[(days + 4) % 5];
  let neptu = NEPTU_DINO[hari] + NEPTU_PASARAN[pasaran];
  return {hari, pasaran, neptu};
}

        <div class="desc"><b>${weton.hari} ${weton.pasaran}</b></div>
        <div class="desc">Neptu: ${weton.neptu} <span class="badge">${weton.neptu < 10? 'Kecil' : weton.neptu < 15? 'Sedang' : 'Besar'}</span></div>
        <div class="desc">Watak: ${weton.neptu <= 10? 'Pendiam, pemikir, rezeki naik-turun' : weton.neptu <= 14? 'Ramai, berwibawa, rezeki lancar' : 'Wibawa tinggi, pemimpin, rezeki gede'}</div>
      </div>`;
  }

  if(pasangan){
    let {total:totalP, detail:detailP} = hitungTotal(pasangan);
    let nomorP = totalP - 50;
    if(nomorP < 1) nomorP += 100;
    if(nomorP > 100) nomorP = nomorP % 100 || 100;
    let wP = WAYANG[nomorP];
    let cocok = Math.abs(nomor - nomorP);
    let skor = cocok < 10? 'Cocok Banget 🔥' : cocok < 30? 'Lumayan Klop 👍' : cocok < 50? 'Butuh Penyesuaian ⚖️' : 'Tantangan Berat ⚠️';

    html += `
      <div class="section">
        <div class="section-title">💕 Kecocokan Jodoh</div>
        <div class="desc"><b>${nama}</b> (${w.nama} No ${nomor})</div>
        <div class="desc"><b>${pasangan}</b> (${wP.nama} No ${nomorP})</div>
        <div class="desc" style="margin-top:10px"><b>Skor:</b> ${skor}</div>
        <div class="desc">Selisih nomor: ${cocok}. Makin kecil makin klop energinya.</div>
      </div>`;
  }

  html += `
      <button class="share" onclick="shareWA('${nama}',${nomor},'${w.nama}','${p.nama}')">
        Share ke WhatsApp 📱
      </button>
    </div>
  `;

  document.getElementById('hasil').innerHTML = html;
  document.getElementById('hasil').style.display = 'block';
}

function shareWA(nama,nomor,wayang,petung){
  let text = `Barusan cek nama "${nama}" dapet:\n\n🎭 ${wayang} No ${nomor}\n💰 Takdir Rezeki: ${petung}\n\nCek nama lu di: ${window.location.href}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

window.onload = () => cekWayang();
</script>
